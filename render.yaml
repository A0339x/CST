services:
  - type: web
    name: cst-app
    env: node
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install && npx prisma generate && npm run build
    startCommand: cd server && npx prisma db push --accept-data-loss && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/data.db
      - key: JWT_SECRET
        generateValue: true
